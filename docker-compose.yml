services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: fox
      POSTGRES_PASSWORD: foxsecret
      POSTGRES_DB: foxsolution
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fox -d foxsolution"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://fox:foxsecret@db:5432/foxsolution
      REDIS_URL: redis://redis:6379
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  diagnostics-worker:
    build:
      context: .
      dockerfile: Dockerfile.dev
    restart: unless-stopped
    command: npm run diagnostics:worker
    environment:
      DATABASE_URL: postgresql://fox:foxsecret@db:5432/foxsolution
      REDIS_URL: redis://redis:6379
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
  redis_data:
